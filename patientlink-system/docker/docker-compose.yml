version: '3.8'

services:
  # ============================================================================
  # DJANGO AUTHENTICATION SERVICE
  # ============================================================================
  auth-service:
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    container_name: patientlink_auth
    expose:
      - "8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-super-secret-key-change-in-production}
      - DJANGO_DEBUG=False
      - DJANGO_SETTINGS_MODULE=auth_service.settings_production
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/patientlink}
      - CORS_ALLOWED_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
      - DATABASE_SSL=true
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Security: Run as non-root user
    user: "1000:1000"
    # Security: Read-only file system where possible
    read_only: false
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      bash -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn auth_service.auth_service.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
      "

  # ============================================================================
  # FASTAPI PATIENT SERVICE
  # ============================================================================
  api-service:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: patientlink_api
    expose:
      - "8001"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/patientlink}
      - JWT_SECRET_KEY=${DJANGO_SECRET_KEY:-your-super-secret-key-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Security: Run as non-root user
    user: "1000:1000"
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2 --log-level info

  # ============================================================================
  # CELERY WORKER (BACKGROUND TASK EXECUTION)
  # ============================================================================
  celery-worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: patientlink_celery_worker
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/patientlink}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${DJANGO_SECRET_KEY:-your-super-secret-key-change-in-production}
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    command: celery -A celery_app:celery_app worker --loglevel=info --concurrency=2

  # ============================================================================
  # CELERY BEAT (SCHEDULED TASKS)
  # ============================================================================
  celery-beat:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: patientlink_celery_beat
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/patientlink}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${DJANGO_SECRET_KEY:-your-super-secret-key-change-in-production}
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    command: celery -A celery_app:celery_app beat --loglevel=info

  # ============================================================================
  # POSTGRESQL DATABASE
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: patientlink_db
    expose:
      - "5432"
    environment:
      POSTGRES_DB: patientlink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Security: Run as non-root user
    user: "999:999"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # REDIS (CELERY BROKER/BACKEND)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: patientlink_redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # REACT FRONTEND WITH NGINX
  # ============================================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: patientlink_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - auth-service
      - api-service
    restart: unless-stopped
    # Security: Run as non-root user
    user: "101:101"
    # Security: Read-only file system
    read_only: true
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:exec,size=64M

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  auth_static_volume:

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: patientlink_bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# DEPLOYMENT NOTES
# ============================================================================
# 
# Security Recommendations:
# 1. Always set strong passwords in .env file:
#    - POSTGRES_PASSWORD=your-secure-password
#    - DJANGO_SECRET_KEY=your-secret-key
#
# 2. Configure CORS_ORIGINS for your production domain
#
# 3. Use SSL/TLS in production (configure nginx with SSL certificates)
#
# 4. Regular security updates:
#    docker-compose pull
#    docker-compose up -d
#
# 5. Monitor logs:
#    docker-compose logs -f
#
# Build and run:
#   docker-compose up --build -d
#
# Stop:
#   docker-compose down
